# .github/workflows/test.yml
#
# CI: install pnpm, install deps, run typecheck + tests + coverage.
# Triggered on push to main and on pull_request.
#
# Note: the CNS health gate (validate.py + graph.py --check)
# runs locally on every commit; it depends on the nervous-
# system skill scripts under ~/.hermes/, which aren't on the
# GitHub runner. Local development enforces CNS hygiene; CI
# enforces the code contract.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Opt into Node 24 for the JS actions above (checkout,
      # pnpm/action-setup, setup-node). The default Node 20
      # runner is deprecated. Once Node 24 becomes the default
      # (June 16, 2026), this can be removed.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage summary
        run: |
          REPORT=coverage/coverage-summary.json
          if [ ! -f "$REPORT" ]; then
            echo "Coverage report not found at $REPORT" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          cat > /tmp/coverage-summary.js << 'SCRIPT'
          const fs = require("fs");
          const d = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8"));
          const t = d.totals;
          const color = pct => {
            const n = parseFloat(pct);
            if (n >= 90) return "🟢";
            if (n >= 70) return "🟡";
            return "🔴";
          };
          const table = [
            "| Metric      | %     | Covered/Total |",
            "|-------------|-------|---------------|",
            `| Lines       | ${color(t.lines.pct)}${t.lines.pct.toFixed(1)}% | ${t.lines.covered}/${t.lines.total} |`,
            `| Statements  | ${color(t.statements.pct)}${t.statements.pct.toFixed(1)}% | ${t.statements.covered}/${t.statements.total} |`,
            `| Functions   | ${color(t.functions.pct)}${t.functions.pct.toFixed(1)}% | ${t.functions.covered}/${t.functions.total} |`,
            `| Branches    | ${color(t.branches.pct)}${t.branches.pct.toFixed(1)}% | ${t.branches.covered}/${t.branches.total} |`,
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, table + "\n");
          SCRIPT
          node /tmp/coverage-summary.js