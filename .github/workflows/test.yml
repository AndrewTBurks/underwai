# .github/workflows/test.yml
#
# CI: install pnpm, install deps, run typecheck + tests.
# Triggered on push to main and on pull_request.
#
# Note: the CNS health gate (validate.py + graph.py --check)
# runs locally on every commit; it depends on the nervous-
# system skill scripts under ~/.hermes/, which aren't on the
# GitHub runner. Local development enforces CNS hygiene; CI
# enforces the code contract.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt into Node 24 for the JS actions above (checkout,
      # pnpm/action-setup, setup-node). The default Node 20
      # runner is deprecated. Once Node 24 becomes the default
      # (June 16, 2026), this can be removed.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Reads the version from package.json's `packageManager`
        # field. Do not also set `version` here — the action errors
        # with ERR_PNPM_BAD_PM_VERSION if both are present.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test
