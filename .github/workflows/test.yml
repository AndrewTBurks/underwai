# .github/workflows/test.yml
#
# CI: install pnpm, install deps, run typecheck + tests.
# Triggered on push to main and on pull_request.
#
# Note: the CNS health gate (validate.py + graph.py --check)
# runs locally on every commit; it depends on the nervous-
# system skill scripts under ~/.hermes/, which aren't on the
# GitHub runner. Local development enforces CNS hygiene; CI
# enforces the code contract.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test
