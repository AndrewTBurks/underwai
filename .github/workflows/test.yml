# .github/workflows/test.yml
#
# CI: install pnpm, install deps, run typecheck + tests + coverage.
# Triggered on push to main and on pull_request.
#
# Note: the CNS health gate (validate.py + graph.py --check)
# runs locally on every commit; it depends on the nervous-
# system skill scripts under ~/.hermes/, which aren't on the
# GitHub runner. Local development enforces CNS hygiene; CI
# enforces the code contract.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Opt into Node 24 for the JS actions above (checkout,
      # pnpm/action-setup, setup-node). The default Node 20
      # runner is deprecated. Once Node 24 becomes the default
      # (June 16, 2026), this can be removed.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage summary
        run: |
          REPORT=coverage/coverage-summary.json
          if [ -f "$REPORT" ]; then
            TOTAL=$(node -e "const d=require('./$REPORT'); console.log(JSON.stringify({p:d.totals.lines.pct.toFixed(1),c:d.totals.lines.covered,t:d.totals.lines.total,s:d.totals.statements.pct.toFixed(1),sc:d.totals.statements.covered,st:d.totals.statements.total,f:d.totals.functions.pct.toFixed(1),fc:d.totals.functions.covered,ft:d.totals.functions.total,b:d.totals.branches.pct.toFixed(1),bc:d.totals.branches.covered,bt:d.totals.branches.total}))")
            node -e "
              const d=JSON.parse('$TOTAL');
              const row=(pct,covered,total)=>\`|\${pct}%|\${covered}/\${total}|\`;
              const fmt=v=>v===undefined?'—':v;
              const p=d.p,c=d.c,t=d.t,s=d.s,sc=d.sc,st=d.st,f=d.f,fc=d.fc,ft=d.ft,b=d.b,bc=d.bc,bt=d.bt;
              const color=pct=>{
                const n=parseFloat(pct);
                if(n>=90)return'🟢';
                if(n>=70)return'🟡';
                return'🔴';
              };
              const lines=\`| Metric | % | Covered/Total |\n|---|---|---|\n| Lines | \${color(p)}\${p}% | \${c}/\${t} |\n| Statements | \${color(s)}\${s}% | \${sc}/\${st} |\n| Functions | \${color(f)}\${f}% | \${fc}/\${ft} |\n| Branches | \${color(b)}\${b}% | \${bc}/\${bt} |\n|`;
              const fs=require('fs');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines);
            "
          else
            echo "Coverage report not found at $REPORT" >> $GITHUB_STEP_SUMMARY
          fi